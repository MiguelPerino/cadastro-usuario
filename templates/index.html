<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <img class="logo" src="{{ url_for('static', filename='img/images.jpeg') }}" alt="Logo">



</head>
<body>
    <div class="home-container">
    <h1>Bem vindo!</h1>

    <p class="home-subtittle">
        Crie sua conta ou faça login para continuar
    </p>

    <div class="actions">
        <a href="{{ url_for('cadastro_page') }}" class="btn btn-primary"> Cadastrar</a>
        <a href="{{ url_for('login_page') }}" class="btn btn-secondary"> Login</a>
    </div> 

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}   
            {% for category, msg in messages %}
            <div class="message {{ category }}">
                {{ msg }}
            </div>
            {% endfor %}
        {% endif %}
    {% endwith %}
</div>

</body>
</html>
